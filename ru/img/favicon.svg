<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="treeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00A888"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0E17" stroke="#1E2A45" stroke-width="1.5"/>

  <!-- Outer ring glow -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.3"/>

  <!-- Stars (space) -->
  <circle cx="14" cy="18" r="1" fill="#8892A8" opacity="0.6"/>
  <circle cx="48" cy="14" r="0.8" fill="#8892A8" opacity="0.5"/>
  <circle cx="50" cy="38" r="1.2" fill="#8892A8" opacity="0.4"/>
  <circle cx="12" cy="44" r="0.7" fill="#8892A8" opacity="0.5"/>
  <circle cx="44" cy="50" r="0.9" fill="#8892A8" opacity="0.3"/>

  <!-- Top star (on tree) -->
  <polygon points="32,8 33.5,13 38,13 34.5,16 35.5,21 32,18 28.5,21 29.5,16 26,13 30.5,13" fill="#FFD93D" opacity="0.9"/>

  <!-- Tree layers -->
  <polygon points="32,14 22,30 42,30" fill="url(#treeGrad)" opacity="0.95"/>
  <polygon points="32,22 20,40 44,40" fill="url(#treeGrad)" opacity="0.85"/>
  <polygon points="32,30 18,50 46,50" fill="url(#treeGrad)" opacity="0.75"/>

  <!-- Trunk -->
  <rect x="29" y="48" width="6" height="8" rx="1" fill="#1E2A45"/>

  <!-- Inner glow highlight -->
  <polygon points="32,16 24,30 40,30" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.3"/>
  <polygon points="32,24 22,40 42,40" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.25"/>
  <polygon points="32,32 20,50 44,50" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.2"/>
</svg>

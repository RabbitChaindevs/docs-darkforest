<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070B"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00A888"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g stroke="#1E2A45" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="#8892A8" opacity="0.6"/>
  <circle cx="300" cy="120" r="1.5" fill="#8892A8" opacity="0.4"/>
  <circle cx="900" cy="60" r="2" fill="#8892A8" opacity="0.5"/>
  <circle cx="1100" cy="200" r="1.5" fill="#8892A8" opacity="0.3"/>
  <circle cx="150" cy="500" r="1.8" fill="#8892A8" opacity="0.4"/>
  <circle cx="1050" cy="450" r="2" fill="#8892A8" opacity="0.5"/>
  <circle cx="500" cy="550" r="1.2" fill="#8892A8" opacity="0.3"/>
  <circle cx="700" cy="100" r="1" fill="#8892A8" opacity="0.5"/>

  <!-- Tree icon (center left) -->
  <g transform="translate(80, 180) scale(3.5)">
    <circle cx="32" cy="32" r="30" fill="#0A0E17" stroke="#1E2A45" stroke-width="1.5"/>
    <polygon points="32,14 22,30 42,30" fill="url(#accentGrad)" opacity="0.95"/>
    <polygon points="32,22 20,40 44,40" fill="url(#accentGrad)" opacity="0.85"/>
    <polygon points="32,30 18,50 46,50" fill="url(#accentGrad)" opacity="0.75"/>
    <rect x="29" y="48" width="6" height="8" rx="1" fill="#1E2A45"/>
    <polygon points="32,8 33.5,13 38,13 34.5,16 35.5,21 32,18 28.5,21 29.5,16 26,13 30.5,13" fill="#FFD93D" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="220" y="260" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="#E8ECF1" letter-spacing="2">Dark Forest</text>
  <text x="220" y="340" font-family="system-ui, sans-serif" font-size="36" font-weight="400" fill="#6B7280" letter-spacing="3">DOCUMENTATION</text>

  <!-- Divider line -->
  <line x1="220" y1="375" x2="500" y2="375" stroke="#00D4AA" stroke-width="3" opacity="0.6"/>

  <!-- Tagline -->
  <text x="220" y="430" font-family="system-ui, sans-serif" font-size="22" fill="#8892A8">
    Fully on-chain interstellar strategy game on BNB Chain
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#00D4AA" opacity="0.08"/>
  <text x="40" y="610" font-family="system-ui, sans-serif" font-size="16" fill="#4B5563">docs.darkforest.uk</text>
  <text x="1060" y="610" font-family="system-ui, sans-serif" font-size="16" fill="#4B5563">✦ Built on BNB Chain</text>
</svg>
